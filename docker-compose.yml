services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: portfolio-monte-carlo:latest
    container_name: portfolio-mc
    ports:
      - "8050:8050"
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8050
    volumes:
      # Persist yfinance data cache between container restarts
      - mc_cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/_dash-layout')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mc_cache:
